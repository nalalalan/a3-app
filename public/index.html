<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>a3</title>
    <meta name="description" content="Private A3 financial readiness monitor.">
    <link rel="canonical" href="https://a3.aolabs.io/">
    <meta property="og:title" content="a3">
    <meta property="og:description" content="Private A3 financial readiness monitor.">
    <meta property="og:url" content="https://a3.aolabs.io/">
    <meta property="og:type" content="website">
    <link rel="icon" href="https://aolabs.io/favicon.svg?v=20260515-ao-disc-a" type="image/svg+xml">
    <link rel="apple-touch-icon" href="https://aolabs.io/marks/ao-ink.svg?v=20260515-ao-disc-a">
    <link rel="manifest" href="/site.webmanifest?v=20260515-a3-rose-blue">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="suite-topbar" aria-label="a3 navigation">
      <div class="suite-brand-cluster">
        <a class="suite-ao-home" href="https://aolabs.io/" aria-label="aolabs.io">
          <img src="https://aolabs.io/marks/ao-ink.svg?v=20260515-ao-disc-a" alt="">
        </a>
        <a class="suite-app-brand" href="/" aria-label="a3 home">
          <img class="suite-app-mark" src="/icon.svg?v=20260515-a3-rose-blue" alt="">
          <span class="suite-app-name">a3</span>
        </a>
      </div>
      <div class="suite-topbar-actions" aria-label="a3 actions">
        <span id="storageState" class="storage-state">loading</span>
        <button id="connectBank" type="button" disabled>connect</button>
        <button id="syncBank" type="button" disabled hidden>sync</button>
        <label class="file-button"><input id="csvInput" type="file" accept=".csv,text/csv">csv</label>
      </div>
    </header>

    <section id="lockPanel" class="lock-panel" aria-label="Private access" hidden>
      <div>
        <p class="label">Private</p>
        <h2>PIN</h2>
      </div>
      <input id="accessInput" type="password" inputmode="numeric" autocomplete="current-password" placeholder="PIN">
      <button id="unlockButton" type="button">Unlock</button>
      <span id="accessMessage"></span>
    </section>

    <main class="shell">
      <section class="primary-state" aria-label="Current data state">
        <p class="label">Data</p>
        <strong id="stateLabel">--</strong>
        <span id="stateReason">--</span>
      </section>

      <section class="summary-row" aria-label="A3 summary">
        <div class="summary-block">
          <p class="label">A3</p>
          <strong id="a3Price">--</strong>
          <span id="a3Code">--</span>
        </div>
        <div class="summary-block">
          <p class="label">Bank data</p>
          <strong id="gapValue">--</strong>
          <span id="gapLabel">--</span>
        </div>
        <div class="summary-block">
          <p class="label">Next</p>
          <strong id="actionLabel">--</strong>
          <span id="actionDetail">--</span>
        </div>
      </section>

      <section class="panel advisor-panel" aria-label="Advisor state">
        <p class="label">Advisor</p>
        <h2 id="advisorStatus">--</h2>
        <strong id="advisorAction">--</strong>
        <span id="advisorSummary">--</span>
        <span id="advisorEffect">--</span>
      </section>

      <details class="panel">
        <summary>Settings</summary>
        <section class="control-row" aria-label="Planning inputs">
          <label>
            <span class="label">CSV mode</span>
            <select id="modeSelect">
              <option value="auto">Auto</option>
              <option value="checking">Checking</option>
              <option value="credit">Credit card</option>
            </select>
          </label>
          <label>
            <span class="label">Balance</span>
            <input id="balanceInput" type="text" inputmode="decimal" placeholder="optional">
          </label>
          <label>
            <span class="label">Floor</span>
            <input id="floorInput" type="text" inputmode="decimal">
          </label>
          <label>
            <span class="label">Down payment</span>
            <input id="downPaymentInput" type="text" inputmode="decimal">
          </label>
          <label>
            <span class="label">Monthly cap</span>
            <input id="monthlyCapInput" type="text" inputmode="decimal">
          </label>
          <label>
            <span class="label">Target date</span>
            <input id="targetDateInput" type="date">
          </label>
          <button id="saveSettings" type="button">Save</button>
        </section>
      </details>

      <details class="panel">
        <summary>Details</summary>
        <div class="detail-grid">
          <section aria-label="Build">
            <p class="label">Build</p>
            <strong id="a3Build">--</strong>
            <a href="/a3-a0j42547.pdf">PDF</a>
          </section>
          <section aria-label="Checks">
            <p class="label">Checks</p>
            <div id="watchList" class="rows"></div>
          </section>
          <section aria-label="Bank">
            <p class="label">Bank</p>
            <div id="bankList" class="rows"></div>
          </section>
          <section aria-label="Changes">
            <p class="label">Changes</p>
            <div id="eventList" class="rows"></div>
          </section>
          <section aria-label="Latest transactions">
            <p class="label">Latest</p>
            <div id="transactionList" class="transactions"></div>
          </section>
        </div>
      </details>
    </main>

    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
